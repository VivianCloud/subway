<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>NYC Subway Route Visualizer</title>

    <!-- Link CSS -->
    <link rel="stylesheet" href="style.css">

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
</head>
<body>

<h2>NYC Subway Route Visualizer 🚇</h2>

<div class="controls">
    <label for="start">Start Station:</label>
    <select id="start">
        <option value="">--Select--</option>
    </select>

    <label for="end">End Station:</label>
    <select id="end">
        <option value="">--Select--</option>
    </select>

    <button id="drawBtn">Draw Route</button>
</div>

<div id="map"></div>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<!-- Link your JS -->
<script src="script.js"></script>

</body>
</html>
